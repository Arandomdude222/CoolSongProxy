<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Player</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
    h1 { color: #333; }
    ul { list-style: none; padding: 0; }
    li { background: white; padding: 10px; margin-bottom: 5px; border-radius: 5px; display: flex; align-items: center; }
    img { width: 50px; height: 50px; object-fit: cover; margin-right: 15px; border-radius: 4px; }
    .info { flex-grow: 1; }
    audio { height: 30px; }
  </style>
</head>
<body>
  <h1>My Local Audio</h1>
  <ul id="audio-list"></ul>

  <script>
    async function loadAudio() {
      const response = await fetch('/songs.json');
      const data = await response.json();
      const list = document.getElementById('audio-list');

      data.forEach(item => {
        const li = document.createElement('li');
        li.innerHTML = `
          ${item.thumbnail ? `<img src="${item.thumbnail}" alt="Thumbnail">` : ''}
          <div class="info">
            <strong>${item.name}</strong><br>
            ${item.artist}
          </div>
          <audio controls src="${item.file}"></audio>
        `;
        list.appendChild(li);
      });
    }
    loadAudio();
  </script>
</body>
</html>
